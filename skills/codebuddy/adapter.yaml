# CodeBuddy Skill Adapter
# CodeBuddy requires Skills as subdirectories containing a SKILL.md file,
# with YAML front matter (name + description).

source: codebuddy

# Install destination path (relative to targetDir)
dest_path: .codebuddy/skills/synapse-knowledge/SKILL.md

# Legacy file paths (cleaned up during install)
legacy_paths:
  - .codebuddy/skills/synapse-knowledge.md

# YAML frontmatter (uses Go template variables from common metadata)
frontmatter: |
  ---
  name: {{.Name}}
  description: "{{.Description}}"
  version: {{.Version}}
  author: {{.Author}}
  metadata:
    tags: {{.Tags}}
  ---

# Platform-specific tips (common tips provided by metadata)
tips:
  - "CodeBuddy automatically loads Skills from .codebuddy/skills/ directory."
