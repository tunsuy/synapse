# Cursor Skill Adapter
# Cursor uses .cursor/rules/*.mdc rule files,
# each .mdc file needs YAML frontmatter (description + alwaysApply/globs).

source: cursor

# Install destination path (relative to targetDir)
dest_path: .cursor/rules/synapse-knowledge.mdc

# Legacy file paths (cleaned up during install)
legacy_paths:
  - .cursorrules

# YAML frontmatter (uses Go template variables from common metadata)
# Note: Cursor .mdc format doesn't need name/version/author, but requires alwaysApply
frontmatter: |
  ---
  description: "{{.Description}}"
  alwaysApply: true
  ---

# Platform-specific tips (common tips provided by metadata)
tips:
  - "Cursor automatically loads .mdc rule files from .cursor/rules/ directory."
  - "Rule is set to alwaysApply: true, active in every conversation."
