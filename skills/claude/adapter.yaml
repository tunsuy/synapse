# Claude Code Skill Adapter
# Claude Code Skills are located at ~/.claude/skills/<name>/SKILL.md.
# After install, invoke via /synapse-knowledge or let the Agent auto-detect triggers.

source: claude-code

# Install destination path (relative to targetDir)
dest_path: .claude/skills/synapse-knowledge/SKILL.md

# Legacy file paths (cleaned up during install)
legacy_paths:
  - .claude/SYNAPSE.md

# YAML frontmatter (uses Go template variables from common metadata)
frontmatter: |
  ---
  name: {{.Name}}
  description: "{{.Description}}"
  version: {{.Version}}
  author: {{.Author}}
  ---

# Platform-specific tips (common tips provided by metadata)
tips:
  - "Claude Code automatically loads Skills from .claude/skills/ directory."
  - "You can invoke via /synapse-knowledge or trigger naturally in conversation."
