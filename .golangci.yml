# yaml-language-server: $schema=https://golangci-lint.run/jsonschema/golangci.jsonschema.json

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    # Default linters
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Additional linters
    - bodyclose
    - dogsled
    - dupl
    - errname
    - errorlint
    - exhaustive
    - copyloopvar
    # - forbidigo  # Disabled: CLI apps need fmt.Print for user output
    # - gochecknoinits  # Disabled: init() is idiomatic for extension registration
    - goconst
    - gocritic
    - gocyclo
    # - godot  # Disabled: Chinese comments don't end with period
    - gofmt
    - goimports
    - goprintffuncname
    - gosec
    - misspell
    - nakedret
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - revive
    - stylecheck
    - thelper
    - tparallel
    - unconvert
    - unparam
    - whitespace

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true
    disable:
      - fieldalignment
      - shadow

  gocyclo:
    min-complexity: 30

  goconst:
    min-len: 3
    min-occurrences: 3

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - dupImport
      - ifElseChain
      - octalLiteral
      - whyNoLint
      - hugeParam
      - rangeValCopy
      - unnamedResult

  goimports:
    local-prefixes: github.com/tunsuy/synapse

  misspell:
    locale: US

  nolintlint:
    require-explanation: true
    require-specific: true

  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      # - name: exported  # Disabled: stuttering names are intentional for clarity
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unreachable-code

  stylecheck:
    checks:
      - all
      - -ST1000
      - -ST1003
      - -ST1016
      - -ST1020
      - -ST1021
      - -ST1022

  gosec:
    excludes:
      - G104 # Audit errors not checked
      - G304 # File path provided as taint input
      - G306 # WriteFile with 0644 is acceptable for knowledge files

issues:
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - dupl
        - gosec
        - goconst
        - gocyclo
        - errcheck
        - gocritic

    # Exclude some linters from running on example files
    - path: example_
      linters:
        - dupl
        - gosec
        - goconst

    # Allow dot imports for testing frameworks
    - path: _test\.go
      text: "dot-imports"
      linters:
        - revive

    # Disable prealloc for processor files (dynamic slice growth is intentional)
    - path: internal/processor/
      linters:
        - prealloc

    # Disable errcheck for type assertions in config parsing (handled by validation)
    - path: internal/source/skill/skill\.go
      linters:
        - errcheck

    # Disable errcheck for store config parsing (type assertions are followed by empty string checks)
    - path: internal/store/
      text: "Error return value is not checked"
      linters:
        - errcheck

    # Disable gocyclo for CLI audit command (complexity is inherent to audit logic)
    - path: cmd/synapse/main\.go
      text: "cyclomatic complexity"
      linters:
        - gocyclo

  max-issues-per-linter: 50
  max-same-issues: 10
